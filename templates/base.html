<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- title text color should be the teal -->
    <title style="color: teal;">{% block title %}Innovation Services Hub{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        canvas: '#f8f9fa',
                        surface: '#ffffff',
                        inner: '#f1f3f5',
                        teal: '#005a70',
                        rosy: '#968f8b',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['"DM Serif Display"', 'serif'],
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .btn-base {
                @apply rounded-md transition-all duration-300 ease-out font-medium inline-flex items-center justify-center;
            }
            .btn-teal {
                @apply bg-teal text-white hover:-translate-y-0.5 hover:shadow-md hover:shadow-teal/20 active:scale-[0.98];
            }
            .btn-outline {
                @apply border border-gray-200 text-gray-700 bg-surface hover:bg-inner active:scale-[0.98];
            }
            .card-panel {
                @apply bg-surface rounded-xl border border-gray-200 transition-all duration-300 ease-out;
            }
            .card-hover {
                @apply hover:-translate-y-0.5 hover:shadow-md hover:shadow-teal/10 hover:border-teal/30;
            }
        }
    </style>
</head>
<body class="bg-canvas text-gray-900 font-sans min-h-screen">
    
    <header class="bg-surface border-b border-gray-200">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="/" class="flex items-center gap-3 group">
                <svg class="w-6 h-6 text-teal" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                </svg>
                <h1 class="font-serif text-2xl tracking-normal text-teal">Innovation Services Hub</h1>
            </a>
            
            <a href="/admin" class="p-2 text-rosy hover:text-teal transition-colors rounded-md hover:bg-inner" title="Administration">
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
            </a>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 py-12">
        {% block content %}{% endblock %}
    </main>

</body>
</html>
